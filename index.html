<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Synapse | Private Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'DM Mono', monospace;
      --bg:          #f9f9f7;
      --bg-secondary:#ffffff;
      --bg-tertiary: #f1f1ee;
      --text:        #1a1a18;
      --text-2:      #6b6b67;
      --text-3:      #adadaa;
      --accent:      #6C63D5;
      --border:      rgba(0,0,0,0.05);
      --border-2:    rgba(0,0,0,0.08);
      --border-3:    rgba(0,0,0,0.12);
      --radius-md:   10px;
      --radius-lg:   14px;
      --radius-xl:   20px;
      --shadow-sm:   0 2px 4px rgba(0,0,0,0.02);
      --shadow-md:   0 4px 12px rgba(0,0,0,0.05);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0e0e0f;
        --bg-secondary:#161618;
        --bg-tertiary: #1c1c1f;
        --text:        #e8e8e6;
        --text-2:      #9a9a96;
        --text-3:      #5c5c59;
        --border:      rgba(255,255,255,0.06);
        --border-2:    rgba(255,255,255,0.10);
        --border-3:    rgba(255,255,255,0.16);
        --shadow-sm:   0 2px 4px rgba(0,0,0,0.2);
        --shadow-md:   0 8px 24px rgba(0,0,0,0.3);
      }
    }

    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
      animation: fadeSlideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .header {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 4rem;
      text-align: center;
    }
    
    .header-logo-wrap {
        margin-bottom: 1.5rem;
        transition: transform 0.3s ease;
    }
    .header-logo-wrap:hover {
        transform: scale(1.02);
    }

    .tagline {
        font-family: var(--serif);
        font-size: 2.5rem;
        font-weight: 400;
        margin-bottom: 0.5rem;
        color: var(--text);
        letter-spacing: -0.02em;
    }
    
    .sub-tagline {
        font-size: 1.1rem;
        color: var(--text-2);
        max-width: 500px;
        line-height: 1.5;
        font-weight: 400;
    }

    .search-wrap {
      max-width: 680px; margin: 0 auto 3.5rem;
      position: relative;
    }
    
    .search-box {
      display: flex; align-items: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border-2);
      border-radius: 100px;
      padding: 6px 6px 6px 24px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-sm);
    }
    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(108, 99, 213, 0.1), var(--shadow-md);
      transform: translateY(-2px);
    }
    .search-icon { color: var(--text-3); flex-shrink: 0; margin-right: 14px; transition: color 0.2s; }
    .search-box:focus-within .search-icon { color: var(--accent); }
    
    .search-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-size: 1.1rem; font-family: var(--font); color: var(--text);
      padding: 12px 0; min-width: 0;
    }
    .search-input::placeholder { color: var(--text-3); }
    
    .search-btn {
      background: var(--text); color: var(--bg);
      border: none;
      border-radius: 100px;
      padding: 0 28px; min-height: 48px;
      font-size: 0.95rem; font-weight: 500; font-family: var(--font);
      cursor: pointer; transition: all 0.2s;
    }
    .search-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .search-btn:active { transform: scale(0.98); }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      max-width: 700px;
      margin: 0 auto;
    }
    
    .layout.has-info {
        grid-template-columns: 1fr 340px;
        max-width: 1100px;
    }

    .result-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 12px;
      text-decoration: none;
      display: block;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-sm);
    }
    .result-card:hover {
      border-color: var(--border-3);
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .result-domain { font-family: var(--mono); font-size: 0.75rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: block; }
    .result-title { font-size: 1.2rem; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
    .result-snippet { font-size: 0.95rem; color: var(--text-2); line-height: 1.6; }

    .info-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-xl);
      padding: 2rem;
      position: sticky;
      top: 2rem;
      box-shadow: var(--shadow-md);
    }

    @media (max-width: 900px) {
      .layout.has-info { grid-template-columns: 1fr; }
      .info-card { position: static; }
      .tagline { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <div class="header-logo-wrap">
        <svg viewBox="0 0 120 120" width="80" height="80">
          <circle cx="60" cy="60" r="50" fill="none" stroke="var(--border-2)" stroke-width="1"/>
          <circle cx="60" cy="60" r="20" fill="var(--accent)"/>
          <g stroke="var(--text-3)" stroke-width="2">
            <line x1="60" y1="20" x2="60" y2="40"/>
            <line x1="60" y1="80" x2="60" y2="100"/>
            <line x1="20" y1="60" x2="40" y2="60"/>
            <line x1="80" y1="60" x2="100" y2="60"/>
          </g>
        </svg>
      </div>
      <h1 class="tagline">Search with intent.</h1>
      <p class="sub-tagline">A minimalist, privacy-first search experience powered by Synapse.</p>
    </header>

    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input class="search-input" id="searchInput" type="text" placeholder="What are you looking for?" autofocus/>
        <button class="search-btn" id="searchBtn">Search</button>
      </div>
    </div>

    <div class="layout" id="layout">
      <div class="results-col" id="results">
        <!-- Results will appear here -->
      </div>
    </div>
  </div>

  <script>
    // Simplified logic for demonstration
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsEl = document.getElementById('results');

    searchBtn.addEventListener('click', () => {
        const query = searchInput.value;
        if (!query) return;
        
        resultsEl.innerHTML = '<p style="text-align:center; color:var(--text-3)">Searching...</p>';
        
        // Simulate search results
        setTimeout(() => {
            resultsEl.innerHTML = `
                <a href="#" class="result-card">
                    <span class="result-domain">SYNAPSE.APP</span>
                    <h3 class="result-title">Understanding Minimalist Design in 2026</h3>
                    <p class="result-snippet">Explore how brands like Anthropic and Apple are redefining the web with clean, focused interfaces...</p>
                </a>
                <a href="#" class="result-card">
                    <span class="result-domain">WIKIPEDIA.ORG</span>
                    <h3 class="result-title">Synapse (Biology)</h3>
                    <p class="result-snippet">In the nervous system, a synapse is a structure that permits a neuron to pass an electrical or chemical signal...</p>
                </a>
            `;
        }, 800);
    });

    searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchBtn.click();
    });
  </script>
</body>
</html>
