<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Synapse | Private Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --serif: 'Instrument Serif', serif;
      --mono: 'DM Mono', monospace;
      --bg:          #f9f9f7;
      --bg-secondary:#ffffff;
      --bg-tertiary: #f1f1ee;
      --text:        #1a1a18;
      --text-2:      #6b6b67;
      --text-3:      #adadaa;
      --accent:      #6C63D5;
      --border:      rgba(0,0,0,0.05);
      --border-2:    rgba(0,0,0,0.08);
      --border-3:    rgba(0,0,0,0.12);
      --radius-md:   10px;
      --radius-lg:   14px;
      --radius-xl:   20px;
      --shadow-sm:   0 2px 4px rgba(0,0,0,0.02);
      --shadow-md:   0 4px 12px rgba(0,0,0,0.05);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0e0e0f;
        --bg-secondary:#161618;
        --bg-tertiary: #1c1c1f;
        --text:        #e8e8e6;
        --text-2:      #9a9a96;
        --text-3:      #5c5c59;
        --border:      rgba(255,255,255,0.06);
        --border-2:    rgba(255,255,255,0.10);
        --border-3:    rgba(255,255,255,0.16);
        --shadow-sm:   0 2px 4px rgba(0,0,0,0.2);
        --shadow-md:   0 8px 24px rgba(0,0,0,0.3);
      }
    }

    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
      animation: fadeSlideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .header {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 4rem;
      text-align: center;
    }
    
    .header-logo-wrap {
        margin-bottom: 1.5rem;
        transition: transform 0.3s ease;
    }
    .header-logo-wrap:hover {
        transform: scale(1.02);
    }
    .header-logo {
      color: var(--text);
      height: auto;
    }
    .logo {
      font-family: var(--mono); font-size: 13px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2);
    }
    .logo strong { color: var(--text); font-weight: 500; }
    .status-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #1D9E75; margin-right: 7px;
      animation: pulse 2.6s ease-in-out infinite;
    }
    .header-meta { font-family: var(--mono); font-size: 12px; color: var(--text-3); }

    .search-wrap {
      max-width: 680px; margin: 0 auto 3.5rem;
      position: relative;
    }
    
    .search-box {
      display: flex; align-items: center;
      background: var(--bg-secondary);
      border: 1px solid var(--border-2);
      border-radius: 100px;
      padding: 6px 6px 6px 24px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-sm);
    }
    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(108, 99, 213, 0.1), var(--shadow-md);
      transform: translateY(-2px);
    }
    .search-icon { color: var(--text-3); flex-shrink: 0; margin-right: 14px; transition: color 0.2s; }
    .search-box:focus-within .search-icon { color: var(--accent); }
    
    .search-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-size: 1.1rem; font-family: var(--font); color: var(--text);
      padding: 12px 0; min-width: 0;
    }
    .search-input::placeholder { color: var(--text-3); }
    
    .search-btn {
      background: var(--text); color: var(--bg);
      border: none;
      border-radius: 100px;
      padding: 0 28px; min-height: 48px;
      font-size: 0.95rem; font-weight: 500; font-family: var(--font);
      cursor: pointer; transition: all 0.2s;
    }
    .search-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .search-btn:active { transform: scale(0.98); }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      max-width: 700px;
      margin: 0 auto;
    }
    
    .layout.has-info {
        grid-template-columns: 1fr 340px;
        max-width: 1100px;
    }

    .result-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 12px;
      text-decoration: none;
      display: block;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-sm);
    }
    .result-card:hover {
      border-color: var(--border-3);
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .result-domain { font-family: var(--mono); font-size: 0.75rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; display: block; }
    .result-title { font-size: 1.2rem; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
    .result-snippet { font-size: 0.95rem; color: var(--text-2); line-height: 1.6; }

    .info-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-xl);
      padding: 2rem;
      position: sticky;
      top: 2rem;
      box-shadow: var(--shadow-md);
    }

    .speedtest-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .speedtest-card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
    }
    .speedtest-icon {
      font-size: 32px;
    }
    .speedtest-info {
      flex: 1;
    }
    .speedtest-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    .speedtest-subtitle {
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }
    .speedtest-card-body {
      padding: 20px;
    }
    .speedtest-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    .speedtest-stat {
      text-align: center;
    }
    .speedtest-stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }
    .speedtest-stat-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      text-transform: uppercase;
    }
    .speedtest-btn {
      width: 100%;
      background: var(--bg-tertiary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .speedtest-btn:hover {
      background: var(--text);
      color: var(--bg);
    }
    .speedtest-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .speedtest-gauge {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 16px;
    }
    .speedtest-gauge-fill {
      height: 100%;
      background: linear-gradient(90deg, #1DB954, #1ed760);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 3px;
    }

    @media (max-width: 900px) {
      .layout.has-info { grid-template-columns: 1fr; }
      .info-card { position: static; }
      .tagline { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div class="shell">

    <div class="header">
      <div class="logo"><span class="status-dot"></span><strong>Williams</strong> Browser</div>
      <div class="header-meta" id="indexMeta">powered by Searx</div>
    </div>

    <div class="search-wrap">
      <div class="search-box">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input class="search-input" id="searchInput" type="text" placeholder="What are you looking for?" autofocus/>
        <button class="search-btn" id="searchBtn">Search</button>
      </div>
    </div>

    <div class="layout" id="layout">
      <div class="results-col">
        <div class="result-count" id="resultCount"></div>
        <div class="skeleton" id="skeleton">
          <div class="skeleton-card"><div class="skel skel-sm"></div><div class="skel skel-md"></div><div class="skel skel-lg"></div><div class="skel skel-lg2"></div></div>
          <div class="skeleton-card"><div class="skel skel-sm"></div><div class="skel skel-md"></div><div class="skel skel-lg"></div><div class="skel skel-lg2"></div></div>
          <div class="skeleton-card"><div class="skel skel-sm"></div><div class="skel skel-md"></div><div class="skel skel-lg"></div><div class="skel skel-lg2"></div></div>
        </div>
        <div class="results" id="results"></div>
        <div class="empty-state" id="emptyState">no results found</div>
      </div>

      <div class="info-col">
        <div class="github-card" id="githubCard">
          <div class="github-card-header">
            <img class="github-avatar" id="githubAvatar" src="" alt="avatar">
            <div class="github-info">
              <div class="github-name" id="githubName">Loading...</div>
              <div class="github-username" id="githubUsername"></div>
            </div>
          </div>
          <div class="github-bio" id="githubBio"></div>
          <div class="github-stats" id="githubStats"></div>
          <div class="github-links" id="githubLinks"></div>
          <div class="github-repos" id="githubRepos">
            <div class="github-repo"><div class="github-repo-icon">📁</div><div class="github-repo-name">repo</div></div>
            <div class="github-repo"><div class="github-repo-icon">📁</div><div class="github-repo-name">repo</div></div>
            <div class="github-repo"><div class="github-repo-icon">📁</div><div class="github-repo-name">repo</div></div>
          </div>
        </div>

        <div class="info-card" id="infoCard">
          <div class="info-card-header">
            <div class="info-avatar-placeholder" id="infoAvatar"></div>
            <div class="info-header-text">
              <h2 id="infoName">Loading...</h2>
              <p id="infoSubtitle"></p>
            </div>
          </div>
          <div class="info-card-body">
            <p class="info-description" id="infoDescription"></p>
            <div class="info-stats" id="infoStats"></div>
            <div class="info-links" id="infoLinks"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Simplified logic for demonstration
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsEl = document.getElementById('results');
    const skeletonEl = document.getElementById('skeleton');
    const resultCountEl = document.getElementById('resultCount');
    const emptyStateEl = document.getElementById('emptyState');
    const layout = document.getElementById('layout');
    const infoCard = document.getElementById('infoCard');
    const githubCard = document.getElementById('githubCard');
    const infoName = document.getElementById('infoName');
    const infoSubtitle = document.getElementById('infoSubtitle');
    const infoDescription = document.getElementById('infoDescription');
    const infoStats = document.getElementById('infoStats');
    const infoLinks = document.getElementById('infoLinks');
    const infoAvatar = document.getElementById('infoAvatar');

    let startTime = 0;
    let isAnimating = false;

    function doSearch() {
      if (isAnimating) return;
      const q = searchInput.value.trim();
      if (!q) return;

      isAnimating = true;
      searchBtn.disabled = true;
      searchBtn.textContent = 'Searching...';
      startTime = Date.now();

      // Animate out existing results one by one
      const existingCards = document.querySelectorAll('.result-card.visible');
      
      if (existingCards.length > 0) {
        // Slide out each card with delay
        existingCards.forEach((card, i) => {
          setTimeout(() => {
            card.classList.add('slide-out');
          }, i * 80);
        });
        
        // After all cards slide out, fetch new results
        const outDelay = existingCards.length * 80 + 300;
        setTimeout(() => fetchResults(q), outDelay);
      } else {
        // No existing cards, fetch immediately
        fetchResults(q);
      }
    }

    function fetchResults(q) {
      // Reset layout
      layout.classList.remove('has-info');
      infoCard.classList.remove('visible');
      githubCard.classList.remove('visible');
      
      resultsEl.innerHTML = '';
      resultsEl.style.display = 'flex';
      skeletonEl.style.display = 'flex';
      resultCountEl.textContent = 'searching...';
      emptyStateEl.style.display = 'none';

      fetch(`api.php?q=${encodeURIComponent(q)}`)
        .then(r => r.json())
        .then(data => renderResults(data, q))
        .catch(err => {
          console.error('Search error:', err);
          skeletonEl.style.display = 'none';
          emptyStateEl.style.display = 'block';
          resultCountEl.textContent = 'search failed';
          isAnimating = false;
          searchBtn.disabled = false;
          searchBtn.textContent = 'Search';
        });
    }

    function renderResults(data, query) {
      skeletonEl.style.display = 'none';
      
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
      resultCountEl.textContent = `${data.total || 0} results · ${elapsed}s`;
      resultCountEl.classList.remove('flip');
      void resultCountEl.offsetWidth;
      resultCountEl.classList.add('flip');

      if (!data.results || data.results.length === 0) {
        emptyStateEl.style.display = 'block';
        isAnimating = false;
        searchBtn.disabled = false;
        searchBtn.textContent = 'Search';
        return;
      }

      emptyStateEl.style.display = 'none';

      // Check if any profile cards should be shown
      const hasProfiles = data.githubProfile || data.wikipediaInfo;

      if (hasProfiles) {
        renderWithAllProfiles(data, query);
      } else {
        renderSimpleResults(data.results, query);
      }
    }

    function renderWithAllProfiles(data, query) {
      // Reset all card orders
      githubCard.style.order = '100';
      infoCard.style.order = '100';
      
      // Determine order based on which profiles exist (lower = first)
      let order = 0;
      if (data.githubProfile) githubCard.style.order = order++;
      if (data.wikipediaInfo) infoCard.style.order = order++;

      // Update Wikipedia info card
      if (data.wikipediaInfo) {
        infoName.textContent = data.wikipediaInfo.name || 'Unknown';
        infoSubtitle.textContent = 'Wikipedia';
        infoDescription.textContent = data.wikipediaInfo.description || '';
        infoAvatar.innerHTML = getInitials(data.wikipediaInfo.name);
        infoLinks.innerHTML = `<a href="${data.wikipediaInfo.url}" class="info-link" target="_blank" rel="noopener">Read on Wikipedia</a>`;
        infoStats.innerHTML = '';
        infoCard.classList.add('visible');
      }

      // Update GitHub card
      if (data.githubProfile) {
        const profile = data.githubProfile;
        document.getElementById('githubAvatar').src = profile.avatar || '';
        document.getElementById('githubAvatar').onerror = function() {
          this.style.display = 'none';
          this.parentElement.innerHTML = `<div class="info-avatar-placeholder" style="width:80px;height:80px;font-size:28px;">${getInitials(profile.name || profile.username)}</div>`;
        };
        document.getElementById('githubName').textContent = profile.name || profile.username || 'Unknown';
        document.getElementById('githubUsername').textContent = '@' + (profile.username || '');
        document.getElementById('githubBio').textContent = profile.bio || 'No bio available';
        document.getElementById('githubStats').innerHTML = `
          <div class="github-stat">
            <span class="github-stat-value">${formatNumber(profile.followers)}</span>
            <span class="github-stat-label">Followers</span>
          </div>
          <div class="github-stat">
            <span class="github-stat-value">${formatNumber(profile.following)}</span>
            <span class="github-stat-label">Following</span>
          </div>
          <div class="github-stat">
            <span class="github-stat-value">${formatNumber(profile.publicRepos)}</span>
            <span class="github-stat-label">Repos</span>
          </div>
        `;
        let linksHTML = `<a href="${profile.url}" class="github-link" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>`;
        if (profile.location) linksHTML += `<span class="github-link">📍 ${profile.location}</span>`;
        if (profile.company) linksHTML += `<span class="github-link">🏢 ${profile.company}</span>`;
        if (profile.blog) linksHTML += `<a href="${profile.blog}" class="github-link" target="_blank" rel="noopener">🌐 Website</a>`;
        document.getElementById('githubLinks').innerHTML = linksHTML;
        githubCard.classList.add('visible');
      }

      // Render results
      resultsEl.innerHTML = data.results.map((r, i) => {
        const domain = extractDomain(r.url);
        return `
          <a href="${escapeHtml(r.url)}" class="result-card" target="_blank" rel="noopener" style="opacity: 0;">
            <div class="result-top">
              <div class="favicon" style="background:${getFaviconBg(domain)};color:${getFaviconColor(domain)};">${getInitials(domain)}</div>
              <span class="result-domain">${escapeHtml(domain)}</span>
            </div>
            <div class="result-title">${highlightQuery(r.title, query)}</div>
            ${r.snippet ? `<div class="result-snippet">${highlightQuery(r.snippet, query)}</div>` : ''}
          </a>
        `;
      }).join('');

      const resultCards = resultsEl.querySelectorAll('.result-card');

      resultCards.forEach((card, i) => {
        setTimeout(() => {
          card.style.opacity = '';
          card.classList.add('visible');
        }, i * 100);
      });

      const infoDelay = resultCards.length * 100 + 200;

      setTimeout(() => {
        layout.classList.add('has-info');
      }, infoDelay);

      setTimeout(() => {
        isAnimating = false;
        searchBtn.disabled = false;
        searchBtn.textContent = 'Search';
      }, infoDelay + 300);
    }

    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
      return num.toString();
    }

    function renderSimpleResults(results, query) {
      // Render results
      resultsEl.innerHTML = results.map((r, i) => {
        const domain = extractDomain(r.url);
        return `
          <a href="${escapeHtml(r.url)}" class="result-card" target="_blank" rel="noopener" style="opacity: 0;">
            <div class="result-top">
              <div class="favicon" style="background:${getFaviconBg(domain)};color:${getFaviconColor(domain)};">${getInitials(domain)}</div>
              <span class="result-domain">${escapeHtml(domain)}</span>
            </div>
            <div class="result-title">${highlightQuery(r.title, query)}</div>
            ${r.snippet ? `<div class="result-snippet">${highlightQuery(r.snippet, query)}</div>` : ''}
          </a>
        `;
      }).join('');

      const resultCards = resultsEl.querySelectorAll('.result-card');
      
      // Animate cards in one by one
      resultCards.forEach((card, i) => {
        setTimeout(() => {
          card.style.opacity = '';
          card.classList.add('visible');
        }, i * 100);
      });

      setTimeout(() => {
        isAnimating = false;
        searchBtn.disabled = false;
        searchBtn.textContent = 'Search';
      }, resultCards.length * 100 + 100);
    }

    function extractDomain(url) {
      try {
        return new URL(url).hostname.replace('www.', '');
      } catch {
        return url;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function highlightQuery(text, query) {
      if (!text || !query) return escapeHtml(text || '');
      const words = query.split(/\s+/).filter(w => w.length > 2);
      let result = escapeHtml(text);
      words.forEach(word => {
        const regex = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        result = result.replace(regex, '<mark>$1</mark>');
      });
      return result;
    }

    function getFaviconBg(domain) {
      const colors = ['#0C447C', '#3C3489', '#633806', '#712B13', '#27500A', '#444441'];
      const hash = domain.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      return colors[hash % colors.length];
    }

    function getFaviconColor(domain) {
      const colors = ['#B5D4F4', '#CECBF6', '#FAC775', '#F5C4B3', '#C0DD97', '#D3D1C7'];
      const hash = domain.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      return colors[hash % colors.length];
    }

    function getInitials(text) {
      if (!text) return '??';
      return text.split(' ').map(w => w[0]).filter(Boolean).join('').substring(0, 2).toUpperCase();
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    if (window.location.search) {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q');
      if (q) {
        searchInput.value = q;
        doSearch();
      }
    }
  </script>
</body>
