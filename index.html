<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Williams Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font: 'DM Sans', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
      --bg:          #0e0e0f;
      --bg-secondary:#161618;
      --bg-tertiary: #1c1c1f;
      --text:        #e8e8e6;
      --text-2:      #9a9a96;
      --text-3:      #5c5c59;
      --border:      rgba(255,255,255,0.08);
      --border-2:    rgba(255,255,255,0.14);
      --border-3:    rgba(255,255,255,0.22);
      --radius-md:   8px;
      --radius-lg:   12px;
      --radius-xl:   16px;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:          #ffffff;
        --bg-secondary:#f5f5f3;
        --bg-tertiary: #efefed;
        --text:        #1a1a18;
        --text-2:      #6b6b67;
        --text-3:      #adadaa;
        --border:      rgba(0,0,0,0.08);
        --border-2:    rgba(0,0,0,0.14);
        --border-3:    rgba(0,0,0,0.22);
      }
    }

    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font); }

    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideOutLeft {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to   { opacity: 0; transform: translateX(-60px) scale(0.95); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(80px) scale(0.95); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    @keyframes countFlip {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
      animation: fadeSlideDown 0.4s ease both;
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 3rem;
      animation: fadeSlideDown 0.4s 0.05s ease both; opacity: 0;
    }
    .header-logo {
      color: var(--text);
      height: auto;
    }
    .logo {
      font-family: var(--mono); font-size: 13px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-2);
    }
    .logo strong { color: var(--text); font-weight: 500; }
    .status-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #1D9E75; margin-right: 7px;
      animation: pulse 2.6s ease-in-out infinite;
    }
    .header-meta { font-family: var(--mono); font-size: 12px; color: var(--text-3); }

    .search-wrap {
      max-width: 660px; margin: 0 auto 2.5rem;
      animation: fadeSlideDown 0.4s 0.1s ease both; opacity: 0;
    }
    .search-label {
      font-family: var(--mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 10px;
    }
    .search-box {
      display: flex; align-items: center;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-2);
      border-radius: var(--radius-lg);
      padding: 0 0 0 16px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.18s;
    }
    .search-box:focus-within {
      border-color: var(--border-3);
      box-shadow: 0 0 0 3px rgba(83,74,183,0.15);
      transform: translateY(-1px);
    }
    .search-icon { color: var(--text-3); flex-shrink: 0; margin-right: 10px; transition: color 0.2s; }
    .search-box:focus-within .search-icon { color: var(--text-2); }
    .search-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-size: 15px; font-family: var(--font); color: var(--text);
      padding: 13px 0; min-width: 0;
    }
    .search-input::placeholder { color: var(--text-3); }
    .search-btn {
      background: var(--text); color: var(--bg);
      border: none;
      border-radius: 0 calc(var(--radius-lg) - 1px) calc(var(--radius-lg) - 1px) 0;
      padding: 0 22px; min-height: 48px;
      font-size: 13px; font-weight: 500; font-family: var(--font);
      cursor: pointer; letter-spacing: 0.02em;
      transition: opacity 0.15s, transform 0.1s;
    }
    .search-btn:hover { opacity: 0.78; }
    .search-btn:active { transform: scale(0.97); }

    .result-count { font-family: var(--mono); font-size: 12px; color: var(--text-3); margin-bottom: 12px; }
    .result-count.flip { animation: countFlip 0.22s ease both; }

    .layout {
      display: flex;
      justify-content: center;
      gap: 20px;
      align-items: start;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .layout.has-info {
      justify-content: center;
    }

    .results-col {
      width: 100%;
      max-width: 660px;
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .layout.has-info .results-col {
      max-width: 660px;
    }

    .info-col {
      width: 0;
      opacity: 0;
      transform: translateX(60px);
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      flex-shrink: 0;
      padding-top: 28px;
      display: flex;
      flex-direction: column;
    }

    .layout.has-info .info-col {
      width: 340px;
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .skeleton { display: none; flex-direction: column; gap: 10px; }
    .skeleton-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
    }
    .skel {
      border-radius: 4px;
      background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-tertiary) 50%, var(--bg-secondary) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
    }
    .skel-sm  { height: 10px; width: 28%; margin-bottom: 10px; }
    .skel-md  { height: 13px; width: 68%; margin-bottom: 8px; }
    .skel-lg  { height: 11px; width: 92%; margin-bottom: 5px; }
    .skel-lg2 { height: 11px; width: 74%; }

    .results { display: flex; flex-direction: column; gap: 10px; }

    .result-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      cursor: pointer;
      text-decoration: none;
      display: block;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.35s ease;
    }
    .result-card.visible {
      opacity: 1;
      transform: translateY(0);
      animation: fadeSlideUp 0.35s ease forwards;
    }
    .result-card.slide-out {
      animation: slideOutLeft 0.3s ease forwards;
    }
    .result-card:hover {
      border-color: var(--border-2);
      background: var(--bg-tertiary);
      transform: translateY(-1px);
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    }

    .result-top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .favicon {
      width: 15px; height: 15px; border-radius: 3px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 500; font-family: var(--mono);
    }
    .result-domain { font-family: var(--mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.03em; }
    .result-badge {
      margin-left: auto; font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em;
      padding: 2px 8px; border-radius: 100px;
      border: 0.5px solid var(--border); color: var(--text-3);
    }
    .result-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 5px; line-height: 1.45; }
    .result-snippet { font-size: 13px; color: var(--text-2); line-height: 1.65; }
    .result-snippet mark { background: transparent; color: var(--text); font-weight: 500; }

    .info-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      opacity: 0;
      transform: translateX(60px) scale(0.95);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: sticky;
      top: 2.5rem;
      margin-bottom: 16px;
    }
    .info-card.visible {
      opacity: 1;
      transform: translateX(0) scale(1);
      animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .info-card-header {
      background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-secondary) 100%);
      padding: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .info-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border-2);
    }
    .info-avatar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3C3489, #0C447C);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 500;
      color: white;
    }

    .info-header-text h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .info-header-text p {
      font-size: 13px;
      color: var(--text-2);
    }

    .info-card-body {
      padding: 1rem 1.5rem 1.5rem;
    }

    .info-description {
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .info-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .info-stat {
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: 10px 12px;
    }
    .info-stat-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .info-stat-value {
      font-size: 14px;
      font-weight: 500;
    }

    .info-links {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 0.5px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .info-link {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--bg-tertiary);
      color: var(--text-2);
      text-decoration: none;
      transition: all 0.15s;
    }
    .info-link:hover {
      background: var(--text);
      color: var(--bg);
    }

    .empty-state {
      display: none; text-align: center; padding: 3rem 1rem;
      font-family: var(--mono); font-size: 13px; color: var(--text-3);
    }

    /* GitHub Profile Card */
    .github-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      opacity: 0;
      transform: translateX(60px) scale(0.95);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      margin-bottom: 16px;
    }
    .github-card.visible {
      opacity: 1;
      transform: translateX(0) scale(1);
    }
    .github-card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: linear-gradient(135deg, #24292e 0%, #1a1f24 100%);
    }
    .github-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.1);
    }
    .github-info {
      flex: 1;
    }
    .github-name {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 2px;
    }
    .github-username {
      font-family: var(--mono);
      font-size: 14px;
      color: #8b949e;
    }
    .github-bio {
      padding: 16px 20px;
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.5;
      border-bottom: 0.5px solid var(--border);
    }
    .github-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }
    .github-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      background: var(--bg-secondary);
    }
    .github-stat-value {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }
    .github-stat-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .github-links {
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .github-repos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 3px;
      background: var(--border);
    }
    .github-repo {
      aspect-ratio: 1;
      background: var(--bg-tertiary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .github-repo:hover {
      background: var(--bg-secondary);
    }
    .github-repo-icon {
      font-size: 20px;
      margin-bottom: 4px;
    }
    .github-repo-name {
      font-size: 10px;
      color: var(--text-2);
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .github-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-2);
      text-decoration: none;
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border-radius: 100px;
      transition: all 0.15s;
    }
    .github-link:hover {
      background: var(--text);
      color: var(--bg);
    }
    .github-link svg {
      width: 14px;
      height: 14px;
    }

    .github-posts {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      padding: 3px;
      background: var(--border);
    }

    .speedtest-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .speedtest-card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
    }
    .speedtest-icon {
      font-size: 32px;
    }
    .speedtest-info {
      flex: 1;
    }
    .speedtest-title {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    .speedtest-subtitle {
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,0.8);
    }
    .speedtest-card-body {
      padding: 20px;
    }
    .speedtest-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    .speedtest-stat {
      text-align: center;
    }
    .speedtest-stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }
    .speedtest-stat-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      text-transform: uppercase;
    }
    .speedtest-btn {
      width: 100%;
      background: var(--bg-tertiary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .speedtest-btn:hover {
      background: var(--text);
      color: var(--bg);
    }
    .speedtest-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .speedtest-gauge {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 16px;
    }
    .speedtest-gauge-fill {
      height: 100%;
      background: linear-gradient(90deg, #1DB954, #1ed760);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 3px;
    }

    @media (max-width: 900px) {
      .layout.has-info {
        grid-template-columns: 1fr;
      }
      .info-card {
        position: static;
      }
    }

    @media (max-width: 520px) {
      .shell { padding: 1.5rem 1rem 3rem; }
      .search-btn { padding: 0 14px; font-size: 12px; }
      .result-title { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="shell">

    <div class="header">
      <svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" width="180" height="55" class="header-logo">
  <!-- Icon group -->
  <g transform="translate(78, 80)">
    <!-- Lines from center -->
    <line x1="0" y1="0" x2="-38" y2="-32" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="38" y2="-32" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-42" y2="28" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="42" y2="28" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Satellite nodes -->
    <!-- Top-left: teal -->
    <circle cx="-42" cy="-36" r="10" fill="#2CC4B2"/>
    <!-- Top-right: red/coral -->
    <circle cx="42" cy="-36" r="10" fill="#E05A5A"/>
    <!-- Bottom-left: orange/yellow -->
    <circle cx="-46" cy="32" r="10" fill="#E8A020"/>
    <!-- Bottom-right: green -->
    <circle cx="46" cy="32" r="10" fill="#7DC642"/>

    <!-- Center node: purple -->
    <circle cx="0" cy="0" r="22" fill="#6C63D5"/>
  </g>

  <!-- "Synapse" text -->
  <text
    x="160"
    y="100"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="700"
    fill="currentColor"
    letter-spacing="-1"
  >Synapse</text>
</svg>
      <div class="header-meta" id="indexMeta">powered by Searx</div>
    </div>

    <div class="search-wrap">
      <div class="search-label">query</div>
      <div class="search-box">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.2"/>
          <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        <input class="search-input" id="searchInput" type="text" placeholder="Search the web..." value=""/>
        <button class="search-btn" id="searchBtn">Search</button>
      </div>
    </div>

    <div class="layout" id="layout">
      <div class="results-col">
        <div class="result-count" id="resultCount"></div>
        <div class="skeleton" id="skeleton">
          <div class="skeleton-card"><div class="skel skel-sm"></div><div class="skel skel-md"></div><div class="skel skel-lg"></div><div class="skel skel-lg2"></div></div>
          <div class="skeleton-card"><div class="skel skel-sm"></div><div class="skel skel-md"></div><div class="skel skel-lg"></div><div class="skel skel-lg2"></div></div>
          <div class="skeleton-card"><div class="skel skel-sm"></div><div class="skel skel-md"></div><div class="skel skel-lg"></div><div class="skel skel-lg2"></div></div>
        </div>
        <div class="results" id="results"></div>
        <div class="empty-state" id="emptyState">no results found</div>
      </div>

      <div class="info-col">
        <div class="speedtest-card" id="speedtestCard" style="display:none;">
          <div class="speedtest-card-header">
            <div class="speedtest-icon">📶</div>
            <div class="speedtest-info">
              <div class="speedtest-title">Speed Test</div>
              <div class="speedtest-subtitle" id="speedtestStatus">Ready to test</div>
            </div>
          </div>
          <div class="speedtest-card-body">
            <div class="speedtest-stats">
              <div class="speedtest-stat">
                <div class="speedtest-stat-value" id="speedPing">--</div>
                <div class="speedtest-stat-label">Ping (ms)</div>
              </div>
              <div class="speedtest-stat">
                <div class="speedtest-stat-value" id="speedDownload">--</div>
                <div class="speedtest-stat-label">Download</div>
              </div>
              <div class="speedtest-stat">
                <div class="speedtest-stat-value" id="speedUpload">--</div>
                <div class="speedtest-stat-label">Upload</div>
              </div>
            </div>
            <button class="speedtest-btn" id="speedtestRunBtn" onclick="runSpeedTest()">
              <span>▶</span> Start Test
            </button>
            <div class="speedtest-gauge">
              <div class="speedtest-gauge-fill" id="speedtestGauge"></div>
            </div>
          </div>
        </div>

        <div class="github-card" id="githubCard">
          <div class="github-card-header">
            <img class="github-avatar" id="githubAvatar" src="" alt="avatar">
            <div class="github-info">
              <div class="github-name" id="githubName">Loading...</div>
              <div class="github-username" id="githubUsername"></div>
            </div>
          </div>
          <div class="github-bio" id="githubBio"></div>
          <div class="github-stats" id="githubStats"></div>
          <div class="github-links" id="githubLinks"></div>
          
        </div>

        <div class="info-card" id="infoCard">
          <div class="info-card-header">
            <div class="info-avatar-placeholder" id="infoAvatar"></div>
            <div class="info-header-text">
              <h2 id="infoName">Loading...</h2>
              <p id="infoSubtitle"></p>
            </div>
          </div>
          <div class="info-card-body">
            <p class="info-description" id="infoDescription"></p>
            <div class="info-stats" id="infoStats"></div>
            <div class="info-links" id="infoLinks"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsEl = document.getElementById('results');
    const skeletonEl = document.getElementById('skeleton');
    const resultCountEl = document.getElementById('resultCount');
    const emptyStateEl = document.getElementById('emptyState');
    const layout = document.getElementById('layout');
    const infoCard = document.getElementById('infoCard');
    const githubCard = document.getElementById('githubCard');
    const infoName = document.getElementById('infoName');
    const infoSubtitle = document.getElementById('infoSubtitle');
    const infoDescription = document.getElementById('infoDescription');
    const infoStats = document.getElementById('infoStats');
    const infoLinks = document.getElementById('infoLinks');
    const infoAvatar = document.getElementById('infoAvatar');

    let startTime = 0;
    let isAnimating = false;

    function doSearch() {
      if (isAnimating) return;
      const q = searchInput.value.trim();
      if (!q) return;

      isAnimating = true;
      searchBtn.disabled = true;
      searchBtn.textContent = 'Searching...';
      startTime = Date.now();

      // Animate out existing results one by one
      const existingCards = document.querySelectorAll('.result-card.visible');
      
      if (existingCards.length > 0) {
        // Slide out each card with delay
        existingCards.forEach((card, i) => {
          setTimeout(() => {
            card.classList.add('slide-out');
          }, i * 80);
        });
        
        // After all cards slide out, fetch new results
        const outDelay = existingCards.length * 80 + 300;
        setTimeout(() => fetchResults(q), outDelay);
      } else {
        // No existing cards, fetch immediately
        fetchResults(q);
      }
    }

    function fetchResults(q) {
      // Reset layout
      layout.classList.remove('has-info');
      infoCard.classList.remove('visible');
      githubCard.classList.remove('visible');
      
      resultsEl.innerHTML = '';
      resultsEl.style.display = 'flex';
      skeletonEl.style.display = 'flex';
      resultCountEl.textContent = 'searching...';
      emptyStateEl.style.display = 'none';

      fetch(`api.php?q=${encodeURIComponent(q)}`)
        .then(r => r.json())
        .then(data => renderResults(data, q))
        .catch(err => {
          console.error('Search error:', err);
          skeletonEl.style.display = 'none';
          emptyStateEl.style.display = 'block';
          resultCountEl.textContent = 'search failed';
          isAnimating = false;
          searchBtn.disabled = false;
          searchBtn.textContent = 'Search';
        });
    }

    function renderResults(data, query) {
      skeletonEl.style.display = 'none';
      
      // Hide all info cards first
      document.getElementById('speedtestCard').style.display = 'none';
      layout.classList.remove('has-info');
      githubCard.classList.remove('visible');
      infoCard.classList.remove('visible');
      
      // Check for speed test
      if (query.toLowerCase().includes('speed test') || query.toLowerCase() === 'speedtest') {
        document.getElementById('speedtestCard').style.display = 'block';
        layout.classList.add('has-info');
        renderSimpleResults(data.results, query);
        return;
      }
      
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);
      resultCountEl.textContent = `${data.total || 0} results · ${elapsed}s`;
      resultCountEl.classList.remove('flip');
      void resultCountEl.offsetWidth;
      resultCountEl.classList.add('flip');

      if (!data.results || data.results.length === 0) {
        emptyStateEl.style.display = 'block';
        isAnimating = false;
        searchBtn.disabled = false;
        searchBtn.textContent = 'Search';
        return;
      }

      emptyStateEl.style.display = 'none';

      // Check if any profile cards should be shown
      const hasProfiles = data.githubProfile || data.wikipediaInfo;

      if (hasProfiles) {
        renderWithAllProfiles(data, query);
      } else {
        renderSimpleResults(data.results, query);
      }
    }

    function renderWithAllProfiles(data, query) {
      // Reset all card orders
      githubCard.style.order = '100';
      infoCard.style.order = '100';
      
      // Determine order based on which profiles exist (lower = first)
      let order = 0;
      if (data.githubProfile) githubCard.style.order = order++;
      if (data.wikipediaInfo) infoCard.style.order = order++;

      // Update Wikipedia info card
      if (data.wikipediaInfo) {
        infoName.textContent = data.wikipediaInfo.name || 'Unknown';
        infoSubtitle.textContent = 'Wikipedia';
        infoDescription.textContent = data.wikipediaInfo.description || '';
        infoAvatar.innerHTML = getInitials(data.wikipediaInfo.name);
        infoLinks.innerHTML = `<a href="${data.wikipediaInfo.url}" class="info-link" target="_blank" rel="noopener">Read on Wikipedia</a>`;
        infoStats.innerHTML = '';
        infoCard.classList.add('visible');
      }

      // Update GitHub card
      if (data.githubProfile) {
        const profile = data.githubProfile;
        document.getElementById('githubAvatar').src = profile.avatar || '';
        document.getElementById('githubAvatar').onerror = function() {
          this.style.display = 'none';
          this.parentElement.innerHTML = `<div class="info-avatar-placeholder" style="width:80px;height:80px;font-size:28px;">${getInitials(profile.name || profile.username)}</div>`;
        };
        document.getElementById('githubName').textContent = profile.name || profile.username || 'Unknown';
        document.getElementById('githubUsername').textContent = '@' + (profile.username || '');
        document.getElementById('githubBio').textContent = profile.bio || 'No bio available';
        document.getElementById('githubStats').innerHTML = `
          <div class="github-stat">
            <span class="github-stat-value">${formatNumber(profile.followers)}</span>
            <span class="github-stat-label">Followers</span>
          </div>
          <div class="github-stat">
            <span class="github-stat-value">${formatNumber(profile.following)}</span>
            <span class="github-stat-label">Following</span>
          </div>
          <div class="github-stat">
            <span class="github-stat-value">${formatNumber(profile.publicRepos)}</span>
            <span class="github-stat-label">Repos</span>
          </div>
        `;
        let linksHTML = `<a href="${profile.url}" class="github-link" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
          GitHub
        </a>`;
        if (profile.location) linksHTML += `<span class="github-link">📍 ${profile.location}</span>`;
        if (profile.company) linksHTML += `<span class="github-link">🏢 ${profile.company}</span>`;
        if (profile.blog) linksHTML += `<a href="${profile.blog}" class="github-link" target="_blank" rel="noopener">🌐 Website</a>`;
        document.getElementById('githubLinks').innerHTML = linksHTML;
        githubCard.classList.add('visible');
      }

      // Render results
      resultsEl.innerHTML = data.results.map((r, i) => {
        const domain = extractDomain(r.url);
        return `
          <a href="${escapeHtml(r.url)}" class="result-card" target="_blank" rel="noopener" style="opacity: 0;">
            <div class="result-top">
              <div class="favicon" style="background:${getFaviconBg(domain)};color:${getFaviconColor(domain)};">${getInitials(domain)}</div>
              <span class="result-domain">${escapeHtml(domain)}</span>
            </div>
            <div class="result-title">${highlightQuery(r.title, query)}</div>
            ${r.snippet ? `<div class="result-snippet">${highlightQuery(r.snippet, query)}</div>` : ''}
          </a>
        `;
      }).join('');

      const resultCards = resultsEl.querySelectorAll('.result-card');

      resultCards.forEach((card, i) => {
        setTimeout(() => {
          card.style.opacity = '';
          card.classList.add('visible');
        }, i * 100);
      });

      const infoDelay = resultCards.length * 100 + 200;

      setTimeout(() => {
        layout.classList.add('has-info');
      }, infoDelay);

      setTimeout(() => {
        isAnimating = false;
        searchBtn.disabled = false;
        searchBtn.textContent = 'Search';
      }, infoDelay + 300);
    }

    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
      return num.toString();
    }

    function renderSimpleResults(results, query) {
      // Render results
      resultsEl.innerHTML = results.map((r, i) => {
        const domain = extractDomain(r.url);
        return `
          <a href="${escapeHtml(r.url)}" class="result-card" target="_blank" rel="noopener" style="opacity: 0;">
            <div class="result-top">
              <div class="favicon" style="background:${getFaviconBg(domain)};color:${getFaviconColor(domain)};">${getInitials(domain)}</div>
              <span class="result-domain">${escapeHtml(domain)}</span>
            </div>
            <div class="result-title">${highlightQuery(r.title, query)}</div>
            ${r.snippet ? `<div class="result-snippet">${highlightQuery(r.snippet, query)}</div>` : ''}
          </a>
        `;
      }).join('');

      const resultCards = resultsEl.querySelectorAll('.result-card');
      
      // Animate cards in one by one
      resultCards.forEach((card, i) => {
        setTimeout(() => {
          card.style.opacity = '';
          card.classList.add('visible');
        }, i * 100);
      });

      setTimeout(() => {
        isAnimating = false;
        searchBtn.disabled = false;
        searchBtn.textContent = 'Search';
      }, resultCards.length * 100 + 100);
    }

    function extractDomain(url) {
      try {
        return new URL(url).hostname.replace('www.', '');
      } catch {
        return url;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function highlightQuery(text, query) {
      if (!text || !query) return escapeHtml(text || '');
      const words = query.split(/\s+/).filter(w => w.length > 2);
      let result = escapeHtml(text);
      words.forEach(word => {
        const regex = new RegExp(`(${word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        result = result.replace(regex, '<mark>$1</mark>');
      });
      return result;
    }

    function getFaviconBg(domain) {
      const colors = ['#0C447C', '#3C3489', '#633806', '#712B13', '#27500A', '#444441'];
      const hash = domain.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      return colors[hash % colors.length];
    }

    function getFaviconColor(domain) {
      const colors = ['#B5D4F4', '#CECBF6', '#FAC775', '#F5C4B3', '#C0DD97', '#D3D1C7'];
      const hash = domain.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
      return colors[hash % colors.length];
    }

    function getInitials(text) {
      if (!text) return '??';
      return text.split(' ').map(w => w[0]).filter(Boolean).join('').substring(0, 2).toUpperCase();
    }

    async function runSpeedTest() {
      const btn = document.getElementById('speedtestRunBtn');
      const status = document.getElementById('speedtestStatus');
      const gauge = document.getElementById('speedtestGauge');
      
      btn.disabled = true;
      btn.innerHTML = '<span>⏳</span> Testing...';
      status.textContent = 'Testing download speed...';
      gauge.style.width = '0%';
      
      try {
        const ping = await testPing();
        document.getElementById('speedPing').textContent = ping + ' ms';
        status.textContent = 'Testing download...';
        gauge.style.width = '30%';
        
        const download = await testDownload();
        document.getElementById('speedDownload').textContent = download + ' Mbps';
        status.textContent = 'Testing upload...';
        gauge.style.width = '60%';
        
        const upload = await testUpload();
        document.getElementById('speedUpload').textContent = upload + ' Mbps';
        status.textContent = 'Complete!';
        gauge.style.width = '100%';
      } catch (e) {
        status.textContent = 'Test failed: ' + e.message;
      }
      
      btn.disabled = false;
      btn.innerHTML = '<span>▶</span> Test Again';
    }

    async function testPing() {
      const times = [];
      for (let i = 0; i < 5; i++) {
        const start = performance.now();
        await fetch('https://www.google.com/favicon.ico?' + Date.now(), { mode: 'no-cors', cache: 'no-store' });
        times.push(performance.now() - start);
      }
      return Math.round(times.sort((a, b) => a - b)[2]);
    }

    async function testDownload() {
      const testFile = 'https://speed.cloudflare.com/__down?bytes=5000000';
      const start = performance.now();
      await fetch(testFile, { mode: 'no-cors', cache: 'no-store' });
      const duration = (performance.now() - start) / 1000;
      const bitsLoaded = 5000000 * 8;
      const speedBps = bitsLoaded / duration;
      return Math.round(speedBps / 1000000 * 10) / 10;
    }

    async function testUpload() {
      const data = new Uint8Array(500000);
      const start = performance.now();
      await fetch('https://speed.cloudflare.com/__up', {
        method: 'POST',
        body: data,
        mode: 'no-cors'
      });
      const duration = (performance.now() - start) / 1000;
      const bitsSent = 500000 * 8;
      const speedBps = bitsSent / duration;
      return Math.round(speedBps / 1000000 * 10) / 10;
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    if (window.location.search) {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q');
      if (q) {
        searchInput.value = q;
        doSearch();
      }
    }
  </script>
</body>
</html>
