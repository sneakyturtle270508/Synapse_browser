services:
  searx:
    image: searxng/searxng:latest
    container_name: searx
    ports:
      - "8080:8080"
    volumes:
      - ./searx:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://searx:8080/
    restart: unless-stopped
    cap_drop:
      - ALL
    network_mode: bridge

  api:
    image: php:apache
    container_name: synapse-api
    ports:
      - "3000:80"
    volumes:
      - ./index.html:/var/www/html/index.html
      - ./api.php:/var/www/html/api.php
    environment:
      - SEARX_URL=http://searx:8080
    depends_on:
      - searx
    restart: unless-stopped
    network_mode: bridge
