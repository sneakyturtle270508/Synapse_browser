services:
  searx:
    image: searxng/searxng:latest
    container_name: searx
    ports:
      - "8080:8080"
    volumes:
      - ./searx:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped
    cap_drop:
      - ALL

  speedtest:
    build:
      context: .
      dockerfile: speedtest.Dockerfile
    container_name: speedtest
    ports:
      - "8081:80"
    restart: unless-stopped

  api:
    image: php:apache
    container_name: williams-browser-api
    ports:
      - "3000:80"
    volumes:
      - ./index.html:/var/www/html/index.html
      - ./api.php:/var/www/html/api.php
    environment:
      - SEARX_URL=http://searx:8080
      - SPEEDTEST_URL=http://speedtest
    depends_on:
      - searx
      - speedtest
    restart: unless-stopped
